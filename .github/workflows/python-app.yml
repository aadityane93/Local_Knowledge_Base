name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile indexer.py
          python -m py_compile rag_based_query.py
          python -m py_compile cag_based_query.py
          python -m py_compile semantic_cache.py
          python -m py_compile semantic_cache_based_rag.py
          python -m py_compile semantic_cache_based_cag.py
